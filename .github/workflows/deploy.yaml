name: CI-CD

on:
  push:
    branches: ["deploy"]

jobs:
  github-ci-hoangnv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: login docker registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: |
          docker build -t remy4657/test-etrade-be-ci:${{ github.sha }} \
          -t remy4657/test-etrade-be-ci:latest .

      - name: Push Image
        run: |
          docker push remy4657/test-etrade-be-ci:${{ github.sha }}
          docker push remy4657/test-etrade-be-ci:latest
