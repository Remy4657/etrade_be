
services:
  mysql:
    image: mysql:8
    container_name: etrade_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: e_trade
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - java_etrade_mysql_data:/var/lib/mysql
    networks:
      - etrade-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: etrade_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root
    networks:
      - etrade-network
    depends_on:
      - mysql

  backend:
    build:
        context: .
        dockerfile: Dockerfile
    image: remy4657/java_mysql_etrade:latest
    container_name: shop_backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: shop
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/e_trade
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8080:8080"
    networks:
      - etrade-network
networks:
  etrade-network:
    external: true
volumes:
  java_etrade_mysql_data:
